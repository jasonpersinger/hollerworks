        return {
          view:           'board',
          filter:         'all',
          cat:            params.get('cat')    || null,
          remote:         params.get('remote') === '1',
          locationState:  params.get('st')     || null,
          locationRegion: params.get('rgn')    || null,
        };
      }
      if (path.startsWith('/post/')) {
        const id = path.replace('/post/', '').trim();
        if (!id) return { view: 'board', filter: 'all', cat: null };
        return { view: 'post', id };
      }
      if (path === '/submit') return { view: 'submit' };
      if (path === '/admin')  return { view: 'admin', loginToken: params.get('login') || null };
      if (path === '/about')  return { view: 'about' };
      return { view: 'board', filter: 'all', cat: null };
    }

    function buildDescriptionPreview(text, maxLength = 180) {
      if (!text) return '';
      const compact = String(text)
        .replace(/\r/g, '\n')
        .split('\n')
        .map(line => line.replace(/^[-*•]\s+/, '').trim())
        .filter(Boolean)
        .join(' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!compact) return '';
      if (compact.length <= maxLength) return compact;
      return compact.slice(0, maxLength).replace(/\s+\S*$/, '').trim() + '…';
    }

    function appendRichDescription(el, text) {
      if (!text) return;
      const lines = String(text).replace(/\r/g, '').split('\n');
      let paragraphParts = [];
      let listEl = null;

      const flushParagraph = () => {
        if (!paragraphParts.length) return;
        const p = document.createElement('p');
        p.textContent = paragraphParts.join(' ');
        el.appendChild(p);
        paragraphParts = [];
      };

      const flushList = () => {
        if (!listEl) return;
        el.appendChild(listEl);
        listEl = null;
      };

      lines.forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) {
          flushParagraph();
          flushList();
          return;
        }

        const bulletMatch = line.match(/^(?:[-*•]|\d+\.)\s+(.+)$/);
        if (bulletMatch) {
          flushParagraph();
          if (!listEl) listEl = document.createElement('ul');
          const li = document.createElement('li');
          li.textContent = bulletMatch[1].trim();
          listEl.appendChild(li);
          return;
        }

        flushList();
        paragraphParts.push(line);
      });

      flushParagraph();
      flushList();
    }

    function trackEventOnce(storageKey, eventName, payload = {}) {

    function timeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60)  return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60)  return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24)    return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30)     return `${days}d ago`;
      const months = Math.floor(days / 30);
      return `${months}mo ago`;
    }

    async function renderBoardResults(el) {
      try {
        const now = new Date();

        // ── Featured posts ─────────────────────────────────────────────────
        const featSnap = await getDocs(query(
          collection(db, 'posts'),
          where('status',   '==', 'approved'),
          where('featured', '==', true)
        ));
        const featuredDocs = featSnap.docs.filter(d => {
          const until = d.data().featuredUntil?.toDate?.();
          return until && until > now;
        });

        // ── Main board query ───────────────────────────────────────────────
        let constraints = [
          collection(db, 'posts'),
          where('status', '==', 'approved'),
          orderBy('createdAt', 'desc')
        ];
        if (state.cat)              constraints.push(where('category',        '==', state.cat));
        if (state.remote)           constraints.push(where('remoteFriendly',  '==', true));
        if (state.locationState)    constraints.push(where('locationState',   '==', state.locationState));
        if (state.locationRegion)   constraints.push(where('locationRegion',  '==', state.locationRegion));
        constraints.push(limit(PAGE_SIZE + 1));

        let q = query(...constraints);
        const cursor = state.pageCursors[state.page - 1];
        if (cursor) q = query(q, startAfter(cursor));

        const snap    = await getDocs(q);
        const docs    = snap.docs;
        const hasNext = docs.length > PAGE_SIZE;
        const posts   = hasNext ? docs.slice(0, PAGE_SIZE) : docs;

        if (hasNext) state.pageCursors[state.page] = posts[posts.length - 1];

        el.textContent = '';

        const stats = document.createElement('div');
        stats.className = 'mini-panel';
        stats.style.marginBottom = '16px';
        stats.innerHTML = `
          <div class="mini-panel-title">board snapshot</div>
          <div class="mini-panel-rows">
            <div class="mini-panel-row"><span>featured right now</span><strong>${featuredDocs.length}</strong></div>
            <div class="mini-panel-row"><span>visible on this page</span><strong>${posts.length}</strong></div>
            <div class="mini-panel-row"><span>filter scope</span><strong>${escHtml(formatAlertSummary({
              category: state.cat,
              remoteFriendly: state.remote,
              locationState: state.locationState,
              locationRegion: state.locationRegion,
            }))}</strong></div>
          </div>`;
        el.appendChild(stats);

        if (featuredDocs.length === 0 && posts.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty mini-panel';
          empty.innerHTML = `
            <div class="mini-panel-title">no matching posts yet</div>
            <div class="mini-panel-copy">Try a broader filter, save an alert for this slice of the board, or come back after more listings are seeded.</div>
            <div class="mini-panel-copy"><a href="/submit">have a relevant role to post?</a></div>`;
          el.appendChild(empty);
          return;
        }

        const fragment = document.createDocumentFragment();
        featuredDocs.forEach(d => appendPostRow(fragment, d, true));
        const featuredIds = new Set(featuredDocs.map(d => d.id));
        posts.forEach(d => { if (!featuredIds.has(d.id)) appendPostRow(fragment, d, false); });
        el.appendChild(fragment);

        if (state.page > 1 || hasNext) {
          const pag = document.createElement('div');
          pag.className = 'pagination';
          if (state.page > 1) {
            const prev = document.createElement('button');
            prev.className = 'page-btn';
            prev.textContent = '← prev';
            prev.addEventListener('click', () => { state.page--; render(); });
            pag.appendChild(prev);
          }
          const lbl = document.createElement('span');
          lbl.textContent = `page ${state.page}`;
          pag.appendChild(lbl);
          if (hasNext) {
            const next = document.createElement('button');
            next.className = 'page-btn';
            next.textContent = 'next →';
            next.addEventListener('click', () => { state.page++; render(); });
            pag.appendChild(next);
          }
          el.appendChild(pag);
        }
      } catch (err) {
        console.error(err);
        el.textContent = `error loading posts: ${err.message}`;
      }
    }

    async function doSearch(el, queryStr) {
      el.textContent = 'searching...';
      try {
        const facetFilters = [];
        if (state.locationState)    facetFilters.push(`locationState:${state.locationState}`);
        if (state.locationRegion)   facetFilters.push(`locationRegion:${state.locationRegion}`);
        if (state.cat)              facetFilters.push(`category:${state.cat}`);
        if (state.remote)           facetFilters.push('remoteFriendly:true');

        const { hits } = await searchIndex.search(queryStr, {
          hitsPerPage: 40,
          facetFilters: facetFilters.length ? facetFilters : undefined,
        });
        const filteredHits = state.remote
          ? hits.filter(hit => !!hit.remoteFriendly)
          : hits;
        el.textContent = '';

        const countEl = document.createElement('div');
        countEl.className = 'search-result-count';
        countEl.textContent = `${filteredHits.length} result${filteredHits.length !== 1 ? 's' : ''} for "${queryStr}"`;
        el.appendChild(countEl);

        if (filteredHits.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'no results found.';
          el.appendChild(empty);
          return;
        }

        const fragment = document.createDocumentFragment();
        filteredHits.forEach(hit => {
          const locationText = formatLocation(hit);
          const row = document.createElement('a');
          row.className = 'post-row' + (hit.urgent ? ' post-row-urgent' : '');
          row.dataset.id = hit.objectID;
          row.href = `/post/${hit.objectID}`;

          if (hit.companyName) {
            const company = document.createElement('div');
            company.className = 'company-line';
            company.textContent = hit.companyName;
            row.appendChild(company);
            if (hit.companyWebsite) {
              const companyChip = document.createElement('div');
              companyChip.className = 'company-chip';
              companyChip.textContent = formatCompanyLink(hit);
              row.appendChild(companyChip);
            }
          }

          const title = document.createElement('div');
          title.className = 'post-title';
          title.textContent = hit.title;

          const meta = document.createElement('div');
          meta.className = 'post-meta';
          if (hit.type && hit.type !== 'need') {
            const badge = document.createElement('span');
            badge.className = 'badge badge-offer';
            badge.textContent = 'legacy profile';
            meta.appendChild(badge);
          }
          if (hit.urgent) {
            const ub = document.createElement('span');
            ub.className = 'badge badge-urgent';
            ub.textContent = 'urgent';
            meta.appendChild(ub);
          }
          if (hit.remoteFriendly) {
            const rb = document.createElement('span');
            rb.className = 'badge badge-remote';
            rb.textContent = 'remote';
            meta.appendChild(rb);
          }
          const summary = buildDescriptionPreview(hit.description);
          meta.appendChild(document.createTextNode(
            `${hit.category || ''}${locationText ? ' · ' + locationText : ''}${hit.compensation ? ' · ' + hit.compensation : ''}`
          ));

          row.appendChild(title);
          if (summary) {
            const summaryEl = document.createElement('div');
            summaryEl.className = 'post-summary';
            summaryEl.textContent = summary;
            row.appendChild(summaryEl);
          }
          row.appendChild(meta);
          row.addEventListener('click', e => {
            if (!shouldHandleClientNavigation(e)) return;
            e.preventDefault();
            navigate(`/post/${hit.objectID}`);
          });
          fragment.appendChild(row);
        });
        el.appendChild(fragment);
      } catch (err) {
        console.error(err);
        el.textContent = `search error: ${err.message}`;
      }
    }

      el.appendChild(heading);

      const citySel     = form.querySelector('#f-loc-city');
      const turnstileEl = form.querySelector('#turnstileWidget');
      const turnstileStatusEl = form.querySelector('#turnstileStatus');
      const companyInput = form.querySelector('#f-company');
      const companySiteInput = form.querySelector('#f-company-site');
      const companyLinkedInInput = form.querySelector('#f-company-linkedin');

      const renderTurnstileWidget = () => {
        if (!window.turnstile?.render) return false;
        turnstileEl.textContent = '';
        turnstileStatusEl.textContent = 'verification is running...';
        turnstileWidgetId = window.turnstile.render(turnstileEl, {
          sitekey: TURNSTILE_SITE_KEY,
          theme: 'dark',
          appearance: 'always',
          callback: token => {
            turnstileToken = token;
            turnstileStatusEl.textContent = 'verification ready.';
          },
          'expired-callback': () => {
            turnstileToken = '';
            turnstileStatusEl.textContent = 'verification expired. please retry.';
          },
          'timeout-callback': () => {
            turnstileToken = '';
            turnstileStatusEl.textContent = 'verification timed out. please retry.';
          },
          'error-callback': () => {
            turnstileToken = '';
            turnstileEl.textContent = 'verification failed to load. reload and try again.';
            turnstileStatusEl.textContent = 'verification failed.';
          },
        });
        return true;
      };

      const waitForTurnstile = () => {
        if (renderTurnstileWidget()) return;
        let attempts = 0;
        const poll = window.setInterval(() => {
          attempts += 1;
          if (renderTurnstileWidget()) {
            window.clearInterval(poll);
            return;
          }
          if (attempts >= 40) {
            window.clearInterval(poll);
            turnstileEl.textContent = 'verification failed to load. reload and try again.';
            turnstileStatusEl.textContent = 'verification failed.';
          }
        }, 250);
      };

      waitForTurnstile();

      stateSel.addEventListener('change', () => {
        const st = stateSel.value;
        regionSel.textContent = '';
        const blank = document.createElement('option');
        blank.value = ''; blank.textContent = '— select region —';
        regionSel.appendChild(blank);
        regionGroup.style.display = st ? '' : 'none';
        cityGroup.style.display = 'none';
        citySel.textContent = '';
        const cblank = document.createElement('option');
        cblank.value = ''; cblank.textContent = '— select city (optional) —';
        citySel.appendChild(cblank);
        if (st && LOCATIONS[st]) {
          LOCATIONS[st].forEach(r => {
            const o = document.createElement('option');
            o.value = r; o.textContent = r;
            regionSel.appendChild(o);
          });
        }
      });

      regionSel.addEventListener('change', () => {
        const st = stateSel.value;
        citySel.textContent = '';
        const cblank = document.createElement('option');
        cblank.value = ''; cblank.textContent = '— select city (optional) —';
        citySel.appendChild(cblank);
        if (st && LOCATION_CITIES[st]) {
          cityGroup.style.display = '';
          LOCATION_CITIES[st].forEach(c => {
            const o = document.createElement('option');
            o.value = c; o.textContent = c;
            citySel.appendChild(o);
          });
        } else {
          cityGroup.style.display = 'none';
        }
      });

      form.querySelector('#f-title').addEventListener('input', function() {
        form.querySelector('#titleCount').textContent = `${this.value.length}/80`;
      });
      form.querySelector('#f-desc').addEventListener('input', function() {
        form.querySelector('#descCount').textContent = `${this.value.length}/${MAX_DESCRIPTION_LENGTH}`;
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = form.querySelector('#submitBtn');
        msgEl.innerHTML = '';
        btn.disabled = true;
        btn.textContent = 'submitting...';

        const title     = form.querySelector('#f-title').value.trim();
        const cat       = form.querySelector('#f-cat').value;
        const companyName = companyInput.value.trim();
        const companyWebsite = companySiteInput.value.trim();
        const companyLinkedIn = companyLinkedInInput.value.trim();
        const locState  = form.querySelector('#f-loc-state').value;
        const locRegion = form.querySelector('#f-loc-region').value;
        const locCity   = form.querySelector('#f-loc-city').value;
        const locNotes  = form.querySelector('#f-loc-notes').value.trim();
        const comp      = form.querySelector('#f-comp').value.trim();
        const desc      = form.querySelector('#f-desc').value.trim();
        const contact   = form.querySelector('#f-contact').value.trim();
        const website   = form.querySelector('#f-website').value.trim();

        if (!title || !cat || !locState || !locRegion || !comp || !contact) {
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.textContent = 'all required fields must be filled in.';
          msgEl.appendChild(errDiv);
          btn.disabled = false;
          btn.textContent = 'submit post';
          return;
        }
        if (!companyName || !companyWebsite) {
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.textContent = 'job posts need a company name and company website.';
          msgEl.appendChild(errDiv);
          btn.disabled = false;
          btn.textContent = 'submit post';
          return;
        }
        if (!turnstileToken) {
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.textContent = 'complete the verification check before submitting.';
          msgEl.appendChild(errDiv);
          btn.disabled = false;
          btn.textContent = 'submit post';
          return;
        }

        try {
          const remoteFriendly = form.querySelector('#f-remote').checked;
          await submitPostFn({
            type, title, category: cat,
            companyName,
            companyWebsite,
            companyLinkedIn,
            locationState: locState, locationRegion: locRegion,
            locationCity:  locCity  || null,
            locationNotes: locNotes || null,
            compensation: comp, description: desc, contact,
            remoteFriendly, website, formStartedAt,
            turnstileToken
          });

          el.textContent = '';

          const ok = document.createElement('div');
          ok.className = 'msg msg-ok';
          ok.textContent = 'post submitted -- if it fits the board, it will appear after review.';
          el.appendChild(ok);
          trackEvent('submit_success');

          const note = document.createElement('div');
          note.className = 'submit-note';
          note.textContent = `Posting is free during rollout. Paid placement is not self-serve yet. If you want to talk about sponsorships later, email ${SUPPORT_EMAIL}.`;
          el.appendChild(note);

          const backLink = document.createElement('a');
          backLink.href = '/';
          backLink.style.cssText = 'font-size:12px; display:block; margin-top:18px;';
          backLink.textContent = '← back to board';
          el.appendChild(backLink);
        } catch (err) {
          console.error(err);
          if (window.turnstile?.reset && turnstileWidgetId !== null) {
            turnstileToken = '';
            window.turnstile.reset(turnstileWidgetId);
            turnstileStatusEl.textContent = 'verification reset. complete the check and try again.';
          }
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.textContent = `submit failed: ${err.message}`;
          msgEl.appendChild(errDiv);
          btn.disabled = false;
          btn.textContent = 'submit post';
        }
      });
    }

    // ── Admin View ────────────────────────────────────────────────────────
    async function renderAdmin(el) {
      const route = getRoute();
      if (!adminSessionToken && route.loginToken) {
        el.textContent = '';
        const heading = document.createElement('h1');
        heading.className = 'page-heading';
        heading.textContent = '// admin';
        const gate = document.createElement('div');
        gate.className = 'pw-gate';
        gate.textContent = 'signing you in...';
        el.appendChild(heading);
        el.appendChild(gate);
        try {
          await consumeAdminLogin(route.loginToken);
          setAdminFlash('ok', `signed in as ${adminSessionEmail}.`);
          await renderPendingQueue(el);
          return;
        } catch (err) {
          console.error(err);
          renderAdminLogin(el, {
            type: 'err',
            text: err?.message || 'that sign-in link is invalid or expired.',
          });
          return;
        }
      }
      if (!adminSessionToken) {
        renderAdminLogin(el);
        return;
      }
      await renderPendingQueue(el);
    }

    async function consumeAdminLogin(loginToken) {
      if (adminLoginExchange) return adminLoginExchange;
      adminLoginExchange = (async () => {
        const { data } = await adminConsumeLoginLinkFn({ loginToken });
        adminSessionToken = data.token;
        adminSessionEmail = data.email || '';
        sessionStorage.setItem('hollerAdminSession', adminSessionToken);
        sessionStorage.setItem('hollerAdminSessionEmail', adminSessionEmail);
        window.history.replaceState({}, '', '/admin');
      })();
      try {
        await adminLoginExchange;
      } finally {
        adminLoginExchange = null;
      }
    }

    function renderAdminLogin(el, flash = null) {
      el.textContent = '';

      const heading = document.createElement('h1');
      heading.className = 'page-heading';
      heading.textContent = '// admin';

      const gate = document.createElement('div');
      gate.className = 'pw-gate';

      const helper = document.createElement('div');
      helper.className = 'about-body';
      helper.style.marginBottom = '18px';
      helper.textContent = 'enter your admin email and we will send a one-time sign-in link.';

      const emailLabel = document.createElement('label');
      emailLabel.className = 'form-label';
      emailLabel.textContent = 'admin email';

      const emailInput = document.createElement('input');
      emailInput.className = 'form-input';
      emailInput.type = 'email';
      emailInput.placeholder = 'you@company.com';
      emailInput.autocomplete = 'email';

      const spacer = document.createElement('div');
      spacer.style.height = '10px';

      const finePrint = document.createElement('div');
      finePrint.className = 'micro-copy';
      finePrint.style.marginBottom = '12px';
      finePrint.textContent = 'Links expire after 15 minutes and only work once.';

      const emailBtn = document.createElement('button');
      emailBtn.className = 'submit-btn';
      emailBtn.style.width = '100%';
      emailBtn.textContent = 'send sign-in link';

      const emailMsg = document.createElement('div');
      emailMsg.style.marginTop = '10px';

      gate.appendChild(helper);
      gate.appendChild(emailLabel);
      gate.appendChild(emailInput);
      gate.appendChild(spacer);
      gate.appendChild(finePrint);
      gate.appendChild(emailBtn);
      gate.appendChild(emailMsg);
      el.appendChild(heading);
      el.appendChild(gate);

      if (flash) {
        showMsg(emailMsg, flash.type, flash.text);
      }

      const requestLink = async () => {
        emailBtn.disabled = true;
        emailBtn.textContent = 'sending...';
        emailMsg.textContent = '';
        try {
          await adminRequestLoginLinkFn({ email: emailInput.value.trim() });
          showMsg(emailMsg, 'ok', 'If that address is approved, a sign-in link is on the way.');
        } catch (err) {
          console.error(err);
          showMsg(emailMsg, 'err', err.message || 'sign-in failed.');
        } finally {
          emailBtn.disabled = false;
          emailBtn.textContent = 'send sign-in link';
        }
      };

      emailBtn.addEventListener('click', requestLink);
      emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') requestLink(); });
      emailInput.focus();
    }

    let adminFilter = 'pending';

    function clearAdminSession() {
      adminSessionToken = '';
      adminSessionEmail = '';
      sessionStorage.removeItem('hollerAdminSession');
      sessionStorage.removeItem('hollerAdminSessionEmail');
    }

    async function adminCall(fn, payload = {}) {
      const { data } = await fn({ token: adminSessionToken, ...payload });
      return data;
    }

    function handleAdminError(err, el) {
      console.error(err);
      if (err?.code === 'functions/unauthenticated' || err?.code === 'functions/permission-denied') {
        clearAdminSession();
        renderAdminLogin(el);
        const msg = document.createElement('div');
        msg.className = 'msg msg-err';
        msg.textContent = 'admin session expired. sign in again.';
        el.appendChild(msg);
        return true;
      }
      return false;
    }

    function makeStatusBtn(label, targetStatus, postId, card, el) {
      const btn = document.createElement('button');
      btn.className = label === 'approve' || label === 're-open' ? 'btn btn-approve' : 'btn btn-reject';
      btn.textContent = label;
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = label + '...';
        try {
          await adminCall(adminUpdatePostFn, { postId, updates: { status: targetStatus } });
          adminSelectedIds.delete(postId);
          const statusVerb = {
            approve: 'approved',
            reject: 'rejected',
            're-open': 're-opened',
          }[label] || `${label}d`;
          setAdminFlash('ok', `${statusVerb} 1 post.`);
          renderPendingQueue(el);
        } catch (err) {
          if (handleAdminError(err, el)) return;
          btn.disabled = false;
          btn.textContent = label;
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.style.marginTop = '8px';
          errDiv.textContent = `error: ${err.message}`;
          card.appendChild(errDiv);
        }
      });
      return btn;
    }

    function renderEditForm(card, postId, p) {
      card.textContent = '';

      const heading = document.createElement('div');
      heading.className = 'admin-card-title';
      heading.textContent = 'editing post';
      card.appendChild(heading);

      const fields = [
        { id: 'e-title', label: 'title',        value: p.title,        type: 'input',    max: 80 },
        { id: 'e-company', label: 'company name', value: p.companyName, type: 'input', max: 80 },
        { id: 'e-company-site', label: 'company website', value: p.companyWebsite, type: 'input', max: 200 },
        { id: 'e-company-linkedin', label: 'company linkedin', value: p.companyLinkedIn, type: 'input', max: 200 },
        { id: 'e-comp',  label: 'compensation', value: p.compensation, type: 'input'         },
        { id: 'e-desc',  label: 'description',  value: p.description,  type: 'textarea', max: MAX_DESCRIPTION_LENGTH },
        { id: 'e-cont',  label: 'contact',      value: p.contact,      type: 'input'         },
        { id: 'e-mod-notes', label: 'moderation notes', value: p.moderationNotes, type: 'textarea', max: 500 },
      ];

      fields.forEach(f => {
        const group = document.createElement('div');

        const lbl = document.createElement('label');
        lbl.className = 'form-label';
        lbl.htmlFor = f.id;
        lbl.textContent = f.label;
        const inp = document.createElement(f.type === 'textarea' ? 'textarea' : 'input');
        inp.className = f.type === 'textarea' ? 'form-textarea' : 'form-input';
        inp.id = f.id;
        if (f.max) inp.maxLength = f.max;
        inp.value = f.value || '';
        group.appendChild(lbl);
        group.appendChild(inp);
        card.appendChild(group);
      });

      // Category select
      const catGroup = document.createElement('div');
      catGroup.className = 'form-group';
      const catLbl = document.createElement('label');
      catLbl.className = 'form-label';
      catLbl.htmlFor = 'e-cat';
      catLbl.textContent = 'category';
      const catSel = document.createElement('select');
      catSel.className = 'form-select';
      catSel.id = 'e-cat';
      CATEGORIES.forEach(c => {

        opt.textContent = c;
        if (c === p.category) opt.selected = true;

        stSel.className = 'form-select'; stSel.id = 'e-loc-state';

          const o = document.createElement('option');

          if (s === p.locationState) o.selected = true;
          stSel.appendChild(o);
        });
        stGrp.appendChild(stLbl); stGrp.appendChild(stSel);
        card.appendChild(stGrp);

        const rgGrp = document.createElement('div');
        rgGrp.className = 'form-group';
        const rgLbl = document.createElement('label');
        rgLbl.className = 'form-label'; rgLbl.textContent = 'region';
        const rgSel = document.createElement('select');
        rgSel.className = 'form-select'; rgSel.id = 'e-loc-region';
        (LOCATIONS[p.locationState] || []).forEach(r => {
          const o = document.createElement('option');
          o.value = r; o.textContent = r;
          if (r === p.locationRegion) o.selected = true;
          rgSel.appendChild(o);
        });
        rgGrp.appendChild(rgLbl); rgGrp.appendChild(rgSel);

        ctGrp.className = 'form-group';
        const ctLbl = document.createElement('label');

        ctSel.className = 'form-select'; ctSel.id = 'e-loc-city';

            title:          card.querySelector('#e-title').value.trim(),
            companyName:    card.querySelector('#e-company').value.trim() || null,
            companyWebsite: card.querySelector('#e-company-site').value.trim() || null,

            description:    card.querySelector('#e-desc').value.trim(),
            contact:        card.querySelector('#e-cont').value.trim(),

          setAdminFlash('ok', `saved changes: ${updates.title}`);
          renderPendingQueue(card.closest('#content'));
        } catch (err) {
          if (handleAdminError(err, card.closest('#content'))) return;
          saveBtn.disabled = false;
          saveBtn.textContent = 'save';
          const errDiv = document.createElement('div');
          errDiv.className = 'msg msg-err';
          errDiv.textContent = `error: ${err.message}`;
          card.appendChild(errDiv);

      cancelBtn.className = 'btn btn-reject';
      cancelBtn.textContent = 'cancel';
      cancelBtn.addEventListener('click', () => {
        renderPendingQueue(card.closest('#content'));
      });

      actions.appendChild(saveBtn);
      actions.appendChild(cancelBtn);
      card.appendChild(actions);
    }

    async function renderPendingQueue(el) {
      try {
        const { posts, counts, dashboard, sessionEmail } = await adminCall(adminListPostsFn, { status: adminFilter });
        if (sessionEmail) {
          adminSessionEmail = sessionEmail;
          sessionStorage.setItem('hollerAdminSessionEmail', adminSessionEmail);
        }

        // Build dup map: contact → count across loaded results
        const contactCount = {};
        posts.forEach(p => {
          const c = p.contact;
          if (c) contactCount[c] = (contactCount[c] || 0) + 1;
        });
        const visiblePosts = posts.filter(p => {
          const q = adminSearchQuery.trim().toLowerCase();
          if (!q) return true;
          return [
            p.title,
            p.companyName,
            p.contact,
            p.category,
            formatLocation(p),
          ].some(value => String(value || '').toLowerCase().includes(q));
        });
        adminSelectedIds = new Set([...adminSelectedIds].filter(id => visiblePosts.some(p => p.id === id)));

        el.textContent = '';
        const heading = document.createElement('div');
        heading.className = 'page-heading';
        heading.textContent = `// admin — ${adminFilter} (${visiblePosts.length})`;
        el.appendChild(heading);

        const sessionBar = document.createElement('div');
        sessionBar.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;font-size:11px;color:#666;';
        const sessionLabel = document.createElement('div');
        sessionLabel.textContent = adminSessionEmail ? `admin session active as ${adminSessionEmail}` : 'admin session active';
        const signOutBtn = document.createElement('button');
        signOutBtn.className = 'page-btn';
        signOutBtn.textContent = 'sign out';
        signOutBtn.addEventListener('click', () => {
          clearAdminSession();
          navigate('/admin');
        });
        sessionBar.appendChild(sessionLabel);
        sessionBar.appendChild(signOutBtn);
        el.appendChild(sessionBar);

        if (dashboard) {
          const dashboardGrid = document.createElement('section');
          dashboardGrid.className = 'board-grid';
          dashboardGrid.style.marginBottom = '18px';

          const metricsPanel = document.createElement('div');
          metricsPanel.className = 'mini-panel';
          metricsPanel.innerHTML = `
            <div class="mini-panel-title">launch ops snapshot</div>
            <div class="mini-panel-rows">
              <div class="mini-panel-row"><span>active alerts</span><strong>${dashboard.activeAlerts || 0}</strong></div>
              <div class="mini-panel-row"><span>board views, last 7d</span><strong>${dashboard.analytics?.totals?.boardViews || 0}</strong></div>
              <div class="mini-panel-row"><span>post views, last 7d</span><strong>${dashboard.analytics?.totals?.postViews || 0}</strong></div>
              <div class="mini-panel-row"><span>apply clicks, last 7d</span><strong>${dashboard.analytics?.totals?.applyClicks || 0}</strong></div>
              <div class="mini-panel-row"><span>alert signups, last 7d</span><strong>${dashboard.analytics?.totals?.alertSignups || 0}</strong></div>
              <div class="mini-panel-row"><span>successful submissions, last 7d</span><strong>${dashboard.analytics?.totals?.submitSuccesses || 0}</strong></div>
            </div>`;

          const dailyPanel = document.createElement('div');
          dailyPanel.className = 'mini-panel';
          const dailyRows = (dashboard.analytics?.daily || []).slice(-3).map(row => `
            <div class="mini-panel-row"><span>${escHtml(row.dayKey)}</span><strong>${row.boardViews || 0} / ${row.postViews || 0} / ${row.applyClicks || 0}</strong></div>
          `).join('');
          dailyPanel.innerHTML = `
            <div class="mini-panel-title">recent activity</div>
            <div class="mini-panel-copy">Each row shows board views / post views / apply clicks.</div>
            <div class="mini-panel-rows">${dailyRows || '<div class="mini-panel-copy">no analytics recorded yet.</div>'}</div>`;

          dashboardGrid.appendChild(metricsPanel);
          dashboardGrid.appendChild(dailyPanel);
          el.appendChild(dashboardGrid);
        }

        const toolbar = document.createElement('div');
        toolbar.className = 'admin-toolbar';
        const toolsLeft = document.createElement('div');
        toolsLeft.className = 'admin-tools-left';
        const searchInput = document.createElement('input');
        searchInput.className = 'search-input';
        searchInput.style.maxWidth = '280px';
        searchInput.placeholder = 'filter this queue...';
        searchInput.value = adminSearchQuery;
        searchInput.addEventListener('keydown', event => {
          if (event.key !== 'Enter') return;
          event.preventDefault();
          adminSearchQuery = searchInput.value;
          renderPendingQueue(el);
        });
        searchInput.addEventListener('change', () => {
          adminSearchQuery = searchInput.value;
          renderPendingQueue(el);
        });
        const selectAllBtn = document.createElement('button');
        selectAllBtn.className = 'page-btn';
        selectAllBtn.textContent = 'select visible';
        selectAllBtn.addEventListener('click', () => {
          visiblePosts.forEach(p => adminSelectedIds.add(p.id));
          renderPendingQueue(el);
        });
        const runBulkAction = async ({ action, ids, successLabel, confirmLabel, button }) => {
          if (!ids.length) return;
          if (confirmLabel && !confirm(confirmLabel)) return;
          if (button) {
            button.disabled = true;
            button.textContent = 'working...';
          }
          try {
            await adminCall(adminBulkUpdatePostsFn, {
              postIds: ids,
              action,
            });
            ids.forEach(id => adminSelectedIds.delete(id));
            setAdminFlash('ok', `${successLabel} (${ids.length}).`);
            renderPendingQueue(el);
          } catch (err) {
            if (handleAdminError(err, el)) return;
            setAdminFlash('err', err.message || 'bulk action failed.');
            renderPendingQueue(el);
          }
        };
        if (adminFilter === 'pending' && visiblePosts.length) {
          const approveAllBtn = document.createElement('button');
          approveAllBtn.className = 'page-btn';
          approveAllBtn.textContent = 'approve all shown';
          approveAllBtn.addEventListener('click', () => {
            runBulkAction({
              action: 'approve',
              ids: visiblePosts.map(p => p.id),
              successLabel: 'approved all shown',
              confirmLabel: `Approve all ${visiblePosts.length} visible pending posts?`,
              button: approveAllBtn,
            });
          });
          const rejectAllBtn = document.createElement('button');
          rejectAllBtn.className = 'page-btn';
          rejectAllBtn.textContent = 'reject all shown';
          rejectAllBtn.addEventListener('click', () => {
            runBulkAction({
              action: 'reject',
              ids: visiblePosts.map(p => p.id),
              successLabel: 'rejected all shown',
              confirmLabel: `Reject all ${visiblePosts.length} visible pending posts?`,
              button: rejectAllBtn,
            });
          });
          toolsLeft.appendChild(approveAllBtn);
          toolsLeft.appendChild(rejectAllBtn);
        }
        const clearSelectionBtn = document.createElement('button');
        clearSelectionBtn.className = 'page-btn';
        clearSelectionBtn.textContent = 'clear selection';
        clearSelectionBtn.addEventListener('click', () => {
          adminSelectedIds.clear();
          renderPendingQueue(el);
        });
        toolsLeft.appendChild(searchInput);
        toolsLeft.appendChild(selectAllBtn);
        toolsLeft.appendChild(clearSelectionBtn);
        const toolsRight = document.createElement('div');
        toolsRight.className = 'admin-tools-right';
        const selectionLabel = document.createElement('div');
        selectionLabel.textContent = `${adminSelectedIds.size} selected`;
        toolsRight.appendChild(selectionLabel);
        toolbar.appendChild(toolsLeft);
        toolbar.appendChild(toolsRight);
        el.appendChild(toolbar);

        const importPanel = document.createElement('div');
        importPanel.className = 'mini-panel';
        importPanel.style.marginBottom = '18px';
        const importMsg = document.createElement('div');
        const importHeading = document.createElement('div');
        importHeading.className = 'mini-panel-title';
        importHeading.textContent = 'seed / import posts';
        const importCopy = document.createElement('div');
        importCopy.className = 'mini-panel-copy';
        importCopy.textContent = 'Paste a JSON array of posts. Imported listings still go through validation, and you can choose whether they land in pending review or go live immediately.';
        const importTextarea = document.createElement('textarea');
        importTextarea.className = 'form-textarea';
        importTextarea.style.minHeight = '220px';
        importTextarea.placeholder = 'Paste a JSON array of post objects here...';
        importTextarea.value = adminImportDraft;
        importTextarea.addEventListener('input', () => {
          adminImportDraft = importTextarea.value;
        });
        const importControls = document.createElement('div');
        importControls.className = 'admin-tools-left';
        importControls.style.marginTop = '12px';
        const importStatusLabel = document.createElement('label');
        importStatusLabel.className = 'form-label';
        importStatusLabel.style.marginBottom = '0';
        importStatusLabel.textContent = 'import as';
        const importStatusSelect = document.createElement('select');
        importStatusSelect.className = 'form-select';
        importStatusSelect.style.maxWidth = '160px';
        [
          ['pending', 'pending review'],
          ['approved', 'approved / live']
        ].forEach(([value, label]) => {
          const option = document.createElement('option');
          option.value = value;
          option.textContent = label;
          option.selected = adminImportStatus === value;
          importStatusSelect.appendChild(option);
        });
        importStatusSelect.addEventListener('change', () => {
          adminImportStatus = importStatusSelect.value;
        });
        const sampleBtn = document.createElement('button');
        sampleBtn.className = 'btn btn-reject';
        sampleBtn.textContent = 'load sample';
        sampleBtn.addEventListener('click', () => {
          adminImportDraft = ADMIN_IMPORT_TEMPLATE;
          importTextarea.value = adminImportDraft;
        });
        const importBtn = document.createElement('button');
        importBtn.className = 'btn btn-approve';
        importBtn.textContent = 'import posts';
        importBtn.addEventListener('click', async () => {
          importMsg.innerHTML = '';
          importBtn.disabled = true;
          importBtn.textContent = 'importing...';
          try {
            const parsed = JSON.parse(importTextarea.value || '[]');
            const { data } = await adminCall(adminImportPostsFn, {
              status: adminImportStatus,
              posts: parsed,
            });
            adminImportDraft = '';
            adminSelectedIds.clear();
            adminFilter = data.status;
            setAdminFlash('ok', `imported ${data.count} posts to ${data.status}.`);
            renderPendingQueue(el);
          } catch (err) {
            console.error(err);
            showMsg(importMsg, 'err', err.message || 'import failed.');
            importBtn.disabled = false;
            importBtn.textContent = 'import posts';
          }
        });
        importControls.appendChild(importStatusLabel);
        importControls.appendChild(importStatusSelect);
        importControls.appendChild(sampleBtn);
        importControls.appendChild(importBtn);
        importPanel.appendChild(importHeading);
        importPanel.appendChild(importCopy);
        importPanel.appendChild(importTextarea);
        importPanel.appendChild(importControls);
        const importFinePrint = document.createElement('div');
        importFinePrint.className = 'micro-copy';
        importFinePrint.textContent = 'Expected keys: title, category, companyName, companyWebsite, locationState, locationRegion, compensation, description, contact, remoteFriendly. You can also use company, company_url, state, region, city, salary, and applyUrl.';
        importPanel.appendChild(importFinePrint);
        importPanel.appendChild(importMsg);
        el.appendChild(importPanel);

        const tabs = document.createElement('div');
        tabs.style.cssText = 'display:flex;gap:12px;margin-bottom:18px;font-size:11px;';
        ['pending','approved','rejected','expired'].forEach(s => {
          const t = document.createElement('button');
          t.className = 'page-btn' + (adminFilter === s ? ' active' : '');
          t.textContent = `${s} (${counts?.[s] ?? 0})`;
          t.addEventListener('click', () => {
            adminFilter = s;
            adminSelectedIds.clear();
            renderPendingQueue(el);
          });
          tabs.appendChild(t);
        });
        el.appendChild(tabs);

        if (adminFlash) {
          showMsg(el, adminFlash.type, adminFlash.text);
          adminFlash = null;
        }

        if (adminSelectedIds.size > 0) {
          const bulkBar = document.createElement('div');
          bulkBar.className = 'admin-quick-actions';
          const bulkActions = [];
          if (adminFilter === 'pending') bulkActions.push(['approve selected', 'approve'], ['reject selected', 'reject']);
          if (adminFilter === 'approved') bulkActions.push(['expire selected', 'expire']);
          if (adminFilter === 'rejected' || adminFilter === 'expired') bulkActions.push(['re-open selected', 'reopen']);
          bulkActions.push(['delete selected', 'delete']);

          bulkActions.forEach(([label, action]) => {
            const btn = document.createElement('button');
            btn.className = action === 'delete' ? 'btn btn-reject' : 'btn btn-approve';
            btn.textContent = label;
            btn.addEventListener('click', async () => {
              runBulkAction({
                action,
                ids: [...adminSelectedIds],
                successLabel: label.replace(' selected', ''),
                button: btn,
              });
            });
            bulkBar.appendChild(btn);
          });

          el.appendChild(bulkBar);
        }

        if (visiblePosts.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty mini-panel';
          empty.innerHTML = adminSearchQuery
            ? `<div class="mini-panel-title">no matches in ${escHtml(adminFilter)}</div><div class="mini-panel-copy">Try a different queue filter or search term.</div>`
            : `<div class="mini-panel-title">no ${escHtml(adminFilter)} posts</div><div class="mini-panel-copy">This queue is clear for now.</div>`;
          el.appendChild(empty);
          return;
        }

        visiblePosts.forEach(p => {
          const date = p.createdAt
            ? new Date(p.createdAt).toLocaleDateString('en-US',
                { year: 'numeric', month: 'short', day: 'numeric' })
            : 'unknown date';

          const card = document.createElement('div');
          card.className = 'admin-card';

          const check = document.createElement('input');
          check.type = 'checkbox';
          check.className = 'admin-check';
          check.checked = adminSelectedIds.has(p.id);
          check.addEventListener('change', () => {
            if (check.checked) adminSelectedIds.add(p.id);
            else adminSelectedIds.delete(p.id);
            renderPendingQueue(el);
          });
          card.appendChild(check);

          const titleEl = document.createElement('div');
          titleEl.className = 'admin-card-title';
          if (p.type && p.type !== 'need') {
            const badge = document.createElement('span');
            badge.className = 'badge badge-offer';
            badge.textContent = 'legacy profile';
            titleEl.appendChild(badge);
          }
          titleEl.appendChild(document.createTextNode(p.title || ''));

          if (contactCount[p.contact] > 1) {
            const dup = document.createElement('span');
            dup.className = 'badge badge-need';
            dup.style.marginLeft = '6px';
            dup.textContent = 'dup';
            titleEl.appendChild(dup);
          }

          const metaEl = document.createElement('div');
          metaEl.className = 'admin-card-meta';
          metaEl.innerHTML =
            `<span class="meta-label">company</span>${escHtml(p.companyName || 'n/a')}<br>` +
            (p.companyWebsite ? `<span class="meta-label">site</span><a href="${escHtml(p.companyWebsite)}" target="_blank" rel="noopener noreferrer">${escHtml(formatCompanyLink(p))}</a><br>` : '') +
            `<span class="meta-label">category</span>${escHtml(p.category)}<br>` +
            `<span class="meta-label">location</span>${escHtml(formatLocation(p))}<br>` +
            `<span class="meta-label">comp</span>${escHtml(p.compensation)}<br>` +
            `<span class="meta-label">contact</span>${escHtml(p.contact)}<br>` +
            (p.remoteFriendly ? `<span class="meta-label">remote</span><span class="badge badge-remote">remote-friendly</span><br>` : '') +
            `<span class="meta-label">submitted</span>${escHtml(date)}`;

          card.appendChild(titleEl);
          card.appendChild(metaEl);

          if (p.description) {
            const desc = document.createElement('div');
            desc.className = 'admin-card-desc';
            desc.textContent = p.description;
            card.appendChild(desc);
          }

          if (Array.isArray(p.reviewFlags) && p.reviewFlags.length) {
            const flagList = document.createElement('div');
            flagList.className = 'admin-flag-list';
            p.reviewFlags.forEach(flag => {
              const span = document.createElement('span');
              span.className = 'admin-flag';
              span.textContent = flag;
              flagList.appendChild(span);
            });
            card.appendChild(flagList);
          }

          if (p.moderationNotes) {
            const note = document.createElement('div');
            note.className = 'admin-note';
            note.textContent = `notes: ${p.moderationNotes}`;
            card.appendChild(note);
          }

          const actions = document.createElement('div');
          actions.className = 'admin-actions';

          // ── Approve (pending only) ──────────────────────────────────────
          if (adminFilter === 'pending') {
            const approveBtn = makeStatusBtn('approve', 'approved', p.id, card, el);
            actions.appendChild(approveBtn);
          }

          // ── Reject (pending only) ───────────────────────────────────────
          if (adminFilter === 'pending') {
            const rejectBtn = makeStatusBtn('reject', 'rejected', p.id, card, el);
            actions.appendChild(rejectBtn);
          }

          // ── Expire (approved only) ──────────────────────────────────────
          if (adminFilter === 'approved') {
            const expireBtn = makeStatusBtn('expire', 'expired', p.id, card, el);
            actions.appendChild(expireBtn);
          }

          // ── Re-open (rejected + expired only) ──────────────────────────
          if (adminFilter === 'rejected' || adminFilter === 'expired') {
            const reopenBtn = makeStatusBtn('re-open', 'pending', p.id, card, el);
            actions.appendChild(reopenBtn);
          }

          // ── Edit (approved only) ────────────────────────────────────────
          if (adminFilter === 'pending' || adminFilter === 'approved' || adminFilter === 'rejected' || adminFilter === 'expired') {
            const editBtn = document.createElement('button');
            editBtn.className = 'btn btn-approve';
            editBtn.textContent = 'edit';
            editBtn.addEventListener('click', () => renderEditForm(card, p.id, p));
            actions.appendChild(editBtn);
          }

          // ── Featured toggle (approved only) ─────────────────────────────
          if (adminFilter === 'approved') {
            const now = new Date();
            const isFeatured = p.featured && p.featuredUntil && p.featuredUntil > now.getTime();
            const featBtn = document.createElement('button');
            featBtn.className = 'btn btn-approve';
            featBtn.textContent = isFeatured ? 'unfeature' : 'feature';
            featBtn.addEventListener('click', async () => {
              featBtn.disabled = true;
              try {
                if (isFeatured) {
                  await adminCall(adminUpdatePostFn, {
                    postId: p.id,
                    updates: { featured: false, featuredUntil: null }
                  });
                } else {
                  const until = new Date();
                  until.setDate(until.getDate() + 7);
                  await adminCall(adminUpdatePostFn, {
                    postId: p.id,
                    updates: { featured: true, featuredUntil: until.getTime() }
                  });
                }
                setAdminFlash('ok', `${isFeatured ? 'removed featured status' : 'featured post'}: ${p.title}`);
                renderPendingQueue(el);
              } catch (err) {
                if (handleAdminError(err, el)) return;
                featBtn.disabled = false;
              }
            });
            actions.appendChild(featBtn);
          }

          // ── Urgent toggle (approved only) ────────────────────────────────
          if (adminFilter === 'approved') {
            const urgBtn = document.createElement('button');
            urgBtn.className = 'btn btn-approve';
            urgBtn.textContent = p.urgent ? 'unurgent' : 'urgent';
            urgBtn.addEventListener('click', async () => {
              urgBtn.disabled = true;
              try {
                await adminCall(adminUpdatePostFn, {
                  postId: p.id,
                  updates: { urgent: !p.urgent }
                });
                setAdminFlash('ok', `${p.urgent ? 'removed urgent flag' : 'marked urgent'}: ${p.title}`);
                renderPendingQueue(el);
              } catch (err) {
                if (handleAdminError(err, el)) return;
                urgBtn.disabled = false;
              }
            });
            actions.appendChild(urgBtn);
          }

          // ── Delete (all tabs) ────────────────────────────────────────────
          const delBtn = document.createElement('button');
          delBtn.className = 'btn btn-reject';
          delBtn.style.marginLeft = 'auto';
          delBtn.textContent = 'delete';
          delBtn.addEventListener('click', async () => {
            if (!confirm(`Delete "${p.title}"?`)) return;
            delBtn.disabled = true;
            delBtn.textContent = 'deleting...';
            try {
              await adminCall(adminDeletePostFn, { postId: p.id });
              adminSelectedIds.delete(p.id);
              setAdminFlash('ok', `deleted: ${p.title}`);
              renderPendingQueue(el);
            } catch (err) {
              if (handleAdminError(err, el)) return;
              delBtn.disabled = false;
              delBtn.textContent = 'delete';
            }
          });
          actions.appendChild(delBtn);

          card.appendChild(actions);
          el.appendChild(card);
        });
      } catch (err) {
        if (handleAdminError(err, el)) return;
        el.textContent = `error loading queue: ${err.message}`;
      }
    }

    render(); // initial render — must be after all view functions
  </script>
  <footer class="site-footer">
    <p>The goal of holler.works is to make it easier to find real tech and tech-adjacent work tied to Appalachia.</p>
    <p>Compensation is required on every listing.</p>
    <p>Posting is free during rollout.</p>
    <p>Contact: <a href="mailto:hey@holler.works">hey@holler.works</a></p>
  </footer>
</body>
</html>
